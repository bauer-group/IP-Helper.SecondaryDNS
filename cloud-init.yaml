#cloud-config
# =============================================================================
# Secondary DNS Server - Cloud-Init
# =============================================================================
#
# Laedt install.sh von GitHub und fuehrt es aus.
# Alle Parameter sind im .env Block unten - einfach anpassen und deployen!
#
# Zur Laufzeit lassen sich weitere Primaries einfach hinzufuegen:
#   dns-admin primary add ns3.example.com 192.0.2.30 2001:db8::30
#
# GitHub: https://github.com/bauer-group/IP-Helper.SecondaryDNS
#
# =============================================================================

write_files:
  # ###########################################################################
  #
  #                    PARAMETER - HIER ANPASSEN
  #
  # ###########################################################################
  - path: /tmp/.env
    permissions: "0600"
    content: |
      # =========================================================================
      # PRIMARY DNS SERVER (mindestens ein Primary erforderlich)
      # Jeder Primary kann IPv4 und/oder IPv6 haben.
      # =========================================================================

      PRIMARY_1_HOSTNAME="ns1.example.com"
      PRIMARY_1_IPV4="203.0.113.10"
      PRIMARY_1_IPV6="2001:db8::10"

      # Optional weitere Primaries (einfach einkommentieren):
      # PRIMARY_2_HOSTNAME="ns2.example.com"
      # PRIMARY_2_IPV4="203.0.113.11"
      # PRIMARY_2_IPV6="2001:db8::11"

      # PRIMARY_3_HOSTNAME="ns3.example.com"
      # PRIMARY_3_IPV4="203.0.113.12"
      # PRIMARY_3_IPV6="2001:db8::12"

      # =========================================================================
      # PFLICHTANGABEN
      # =========================================================================

      ADMIN_EMAIL="admin@example.com"

      # =========================================================================
      # OPTIONAL: SSH
      # =========================================================================

      SSH_PUBKEY="ssh-ed25519 AAAAC3... admin@example.com"
      SSH_PASSWORD_AUTH="true"

      # =========================================================================
      # OPTIONAL: SERVER
      # =========================================================================

      SECONDARY_HOSTNAME="ns2"
      SECONDARY_FQDN="ns2.example.com"
      TIMEZONE="Etc/UTC"

      # =========================================================================
      # OPTIONAL: AUTO-UPDATE
      # =========================================================================

      AUTO_REBOOT="true"
      REBOOT_TIME="03:00"

      # =========================================================================
      # OPTIONAL: TSIG-KEY (fuer sichere Zone-Transfers)
      # =========================================================================

      # Format: name:algorithm:secret (leer lassen wenn nicht benoetigt)
      TSIG_KEY=""

# ###########################################################################
#
#                    AB HIER NICHTS AENDERN
#
# ###########################################################################

runcmd:
  - curl -fsSL https://raw.githubusercontent.com/bauer-group/IP-Helper.SecondaryDNS/main/install.sh -o /tmp/install.sh
  - chmod +x /tmp/install.sh
  - /tmp/install.sh
  - rm -f /tmp/install.sh /tmp/.env

power_state:
  delay: "+1"
  mode: reboot
  message: "Installation abgeschlossen. Server wird neu gestartet..."
  timeout: 30
  condition: true
